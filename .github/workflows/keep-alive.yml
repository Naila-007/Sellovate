name: Keep Supabase Projects Alive

on:
  schedule:
    - cron: '0 9 */3 * *'
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Sellovate Supabase
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            "https://iclmzwfnvnsvpipnmssa.supabase.co/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_SELLOVATE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SELLOVATE_ANON_KEY }}")
          echo "Status: $STATUS"
          echo "✅ Sellovate Supabase pinged!"
